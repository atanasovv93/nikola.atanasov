<!DOCTYPE html>
<html>
<head>
    <title>Ludo Board with Tables</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: auto;
        }
        td {
            width: 30px;
            height: 30px;
            text-align: center;
            vertical-align: middle;
        }
        .red {
            background-color: red;
        }
        .blue {
            background-color: blue;
        }
        .green {
            background-color: green;
        }
        .yellow {
            background-color: yellow;
        }
        .center {
            background-color: white;
            border: 1px solid black;
        }
        .path {
            background-color: lightgrey;
        }
    </style>
</head>
<body>
    <h1>Working with Tables: Ludo Board</h1>
    <table border="1">
        <tr>
            <td class="red"></td>
            <td class="red"></td>
            <td class="red"></td>
            <td class="path"></td>
            <td class="blue"></td>
            <td class="blue"></td>
            <td class="blue"></td>
        </tr>
        <tr>
            <td class="red"></td>
            <td class="red"></td>
            <td class="red"></td>
            <td class="path"></td>
            <td class="blue"></td>
            <td class="blue"></td>
            <td class="blue"></td>
        </tr>
        <tr>
            <td class="red"></td>
            <td class="red"></td>
            <td class="red"></td>
            <td class="path"></td>
            <td class="blue"></td>
            <td class="blue"></td>
            <td class="blue"></td>
        </tr>
        <tr>
            <td class="path"></td>
            <td class="path"></td>
            <td class="path"></td>
            <td class="center"></td>
            <td class="path"></td>
            <td class="path"></td>
            <td class="path"></td>
        </tr>
        <tr>
            <td class="green"></td>
            <td class="green"></td>
            <td class="green"></td>
            <td class="path"></td>
            <td class="yellow"></td>
            <td class="yellow"></td>
            <td class="yellow"></td>
        </tr>
        <tr>
            <td class="green"></td>
            <td class="green"></td>
            <td class="green"></td>
            <td class="path"></td>
            <td class="yellow"></td>
            <td class="yellow"></td>
            <td class="yellow"></td>
        </tr>
        <tr>
            <td class="green"></td>
            <td class="green"></td>
            <td class="green"></td>
            <td class="path"></td>
            <td class="yellow"></td>
            <td class="yellow"></td>
            <td class="yellow"></td>
        </tr>
    </table>
    
</body>
</html>
