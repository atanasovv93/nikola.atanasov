<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Board</title>
    <style>
        .board {
            border-collapse: collapse;
        }
        .board td {
            width: 40px;
            height: 40px;
            border: 1px solid black;
            text-align: center;
        }
        .red { background-color: red; }
        .blue { background-color: blue; }
        .green { background-color: green; }
        .yellow { background-color: yellow; }
        .path { background-color: lightblue; }
        .start { background-color: lightblue; font-weight: bold; }
        .white { background-color: white; }
    </style>
</head>
<body>
    <table class="board">
        <!-- Add your rows and columns here -->
        <tr>
            <td class="red"></td>
            <td class="red"></td>
            <td class="white"></td>
            <td class="path"></td>
            <td class="path start">START</td>
            <td class="path"></td>
            <td class="white"></td>
            <td class="blue"></td>
            <td class="blue"></td>
        </tr>
        <!-- Repeat and adjust rows for the entire board -->
    </table>
</body>
</html>
